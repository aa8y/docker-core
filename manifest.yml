parameters:
  repository: aa8y/core
templates:
  build: docker build -t {{{repository}}}:{{tag}} {{{context}}}
  push: docker push {{{repository}}}:{{tag}}
structureTest:
  configs:
    - test/config/common.yaml
contexts:
  alpine:
    templates:
      build: docker build -t {{{repository}}}:{{tag}} --build-arg BASE_IMAGE={{baseImage}} {{{context}}}
    tags:
      alpine:
        baseImage: alpine:3.9
        structureTest:
          configs:
            - test/config/alpine.yaml
      gradle5:
        baseImage: gradle:5.4-jdk8-alpine
        structureTest:
          configs:
            - test/config/gradle-5.yaml
      node9:
        baseImage: node:9-alpine
        structureTest:
          configs:
            - test/config/node-9.yaml
      node10:
        baseImage: node:10-alpine
        structureTest:
          configs:
            - test/config/node-10.yaml
      node11:
        baseImage: node:11-alpine
        structureTest:
          configs:
            - test/config/node-11.yaml
      python2:
        baseImage: python:2-alpine3.9
        structureTest:
          configs:
            - test/config/python-2.yaml
      python3:
        baseImage: python:3-alpine3.9
        structureTest:
          configs:
            - test/config/python-3.yaml
  jdk/legacy:
    templates:
      build: docker build -t {{{repository}}}:{{tag}} --build-arg JDK_VERSION={{jdkVersion}} {{{context}}}
    tags:
      jdk7:
        jdkVersion: 7
        structureTest:
          configs:
            - test/config/jdk-7.yaml
      jdk8:
        jdkVersion: 8
        structureTest:
          configs:
            - test/config/jdk-8.yaml
  ubuntu:
    tags:
      ubuntu:
        structureTest:
          configs:
            - test/config/ubuntu.yaml
