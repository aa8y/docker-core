schemaVersion: "2.0.0"

metadataTest:
  envVars:
    - key: JAVA_HOME
      value: /usr/lib/jvm/java-1.7-openjdk

commandTests:
  - name: "java major version is 7"
    command: "java"
    args: ["-version"]
    # java -version writes to stderr
    expectedError: ['"1\.7\.']

  - name: "javac major version is 7"
    command: "javac"
    args: ["-version"]
    expectedError: ['^javac 1\.7\.']

  - name: "java is on PATH"
    command: "sh"
    args: ["-c", "command -v java"]
    exitCode: 0

  - name: "compile and run a HelloWorld class"
    command: "sh"
    args:
      - "-c"
      - 'cd "$(mktemp -d)" && printf ''public class Hello { public static void main(String[] a) { System.out.println("ok"); } }'' > Hello.java && javac Hello.java && java Hello'
    expectedOutput: ["^ok"]
